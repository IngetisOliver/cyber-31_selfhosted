<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab CYDOPOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --accent: #00e5ff;
      --accent2: #7b61ff;
      --text: #e8e8f0;
      --muted: #5a5a72;
      --border: rgba(255,255,255,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      0%   { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
      z-index: 0;
      animation: blobMove 12s ease-in-out infinite alternate;
    }

    @keyframes blobMove {
      from { transform: translate(0, 0); }
      to   { transform: translate(300px, 200px); }
    }

    /* ─── HEADER ─── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 4rem;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo span { color: var(--text); }

    nav {
      display: flex;
      gap: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    nav a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--accent); }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      z-index: 10;
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 4rem;
      max-width: 1100px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,229,255,0.3);
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 2rem;
      width: fit-content;
      animation: fadeInUp 0.6s ease both;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(1.4); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.02em;
      animation: fadeInUp 0.6s ease 0.1s both;
    }

    h1 .line2 {
      display: block;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      margin-top: 2rem;
      font-size: 0.95rem;
      color: var(--muted);
      max-width: 480px;
      line-height: 1.8;
      animation: fadeInUp 0.6s ease 0.2s both;
    }

    .cta-row {
      margin-top: 3rem;
      display: flex;
      gap: 1rem;
      animation: fadeInUp 0.6s ease 0.3s both;
    }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.85rem 2rem;
      border-radius: 4px;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.25s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      font-weight: 700;
    }

    .btn-primary:hover {
      background: #fff;
      box-shadow: 0 0 30px rgba(0,229,255,0.4);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── STATS BAR ─── */
    .stats {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      animation: fadeInUp 0.6s ease 0.4s both;
    }

    .stat {
      flex: 1;
      padding: 2rem 4rem;
      border-right: 1px solid var(--border);
    }

    .stat:last-child { border-right: none; }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      header { padding: 1.5rem 1.5rem; }
      nav { display: none; }
      .hero { padding: 3rem 1.5rem; }
      .stats { flex-direction: column; }
      .stat { border-right: none; border-bottom: 1px solid var(--border); padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">CYD<span>OPOS</span></div>
    <nav>
      <a href="#">Lab</a>
      <a href="#">Docs</a>
      <a href="#">Status</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="badge">Déploiement en ligne</div>
    <h1>
      Mise en ligne
      <span class="line2">réussie.</span>
    </h1>
    <p class="subtitle">
      L'infrastructure est opérationnelle. Ce site de démonstration confirme le bon fonctionnement du pipeline de déploiement automatisé.
    </p>
    <div class="cta-row">
      <a href="#" class="btn btn-primary">Accéder au lab</a>
      <a href="#" class="btn btn-secondary">Documentation</a>
    </div>
  </section>

  <div class="stats">
    <div class="stat">
      <div class="stat-value">OK</div>
      <div class="stat-label">Statut système</div>
    </div>
    <div class="stat">
      <div class="stat-value">100%</div>
      <div class="stat-label">Disponibilité</div>
    </div>
    <div class="stat">
      <div class="stat-value">v1.0</div>
      <div class="stat-label">Version déployée</div>
    </div>
  </div>

</body>
</html>
